<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DidactIA - Asistente de Planeación Didáctica</title>
    <meta name="description" content="DidactIA: Asistente inteligente para docentes de secundaria en México. Genera planeaciones didácticas alineadas con la NEM.">
    <link rel="icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F6EF7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DidactIA">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
</head>
<body>

<!-- Guard de autenticación: se muestra mientras carga -->
<div id="auth-guard" style="position:fixed;inset:0;background:#0F1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;">
    <img src="logo.png" alt="DidactIA" style="width:56px;height:56px;border-radius:14px;animation:pulse 1.5s ease-in-out infinite;opacity:0.9;">
    <p style="color:#64748B;font-family:Inter,sans-serif;font-size:14px;">Cargando DidactIA...</p>
</div>
<style>@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}</style>

<header class="app-header">
    <div class="header-left">
        <img src="logo.png" alt="DidactIA Logo" class="header-logo">
        <div>
            <h1 class="header-title">DidactIA</h1>
            <span class="header-subtitle">Asistente para Docentes</span>
        </div>
    </div>
    <div class="header-right">
        <div class="user-chip" id="user-chip">
            <div class="user-avatar" id="user-avatar">?</div>
            <span id="user-nickname">Cargando...</span>
        </div>
        <button class="logout-btn" id="logout-btn" title="Cerrar sesión">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
        </button>
    </div>
</header>

<main class="app-main">
    <!-- Panel Izquierdo: Chat -->
    <section class="chat-section">
        <div class="section-header">
            <div class="section-icon">💬</div>
            <div>
                <h2 class="section-title">Chat con DidactIA</h2>
                <p class="section-desc">Conversa paso a paso</p>
            </div>
            <button class="new-chat-btn" id="new-chat-btn" title="Nueva planeación">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nueva
            </button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <textarea id="chat-input" class="chat-input" placeholder="Escribe tu mensaje... (Shift+Enter para nueva línea)" rows="1"></textarea>
            <button id="send-btn" class="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </section>

    <!-- Panel Derecho: Visor -->
    <section class="viewer-section">
        <div class="section-header">
            <div class="section-icon">📄</div>
            <div>
                <h2 class="section-title">Planeación Generada</h2>
                <p class="section-desc">Vista previa en tiempo real</p>
            </div>
        </div>
        <div class="content-viewer" id="content-viewer">
            <div class="viewer-placeholder">
                <div class="placeholder-icon">📋</div>
                <h3>Tu planeación aparecerá aquí</h3>
                <p>Comienza la conversación con DidactIA y la planeación se generará automáticamente en formato tabla.</p>
            </div>
        </div>
        <div class="viewer-actions">
            <button class="action-btn primary" id="finalizar-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Generar versión final
            </button>
            <button class="action-btn secondary" id="download-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Descargar en PDF (.pdf)
            </button>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script type="module" src="app.js?v=6.8"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js?v=6.8');
        });
    }
</script>
</body>
</html>
