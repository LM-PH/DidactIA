<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DidactIA - Acceso para Docentes</title>
    <meta name="description" content="Accede a DidactIA, el asistente inteligente para docentes de secundaria en México.">
    <link rel="icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1C212E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DidactIA">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<!-- Partículas de fondo -->
<div class="particles" id="particles"></div>

<div class="auth-container">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <img src="logo.png" alt="DidactIA Logo">
            <span class="auth-logo-text">DidactIA</span>
        </div>
        <p class="auth-subtitle">Asistente inteligente para <strong>docentes de secundaria</strong></p>

        <!-- Mensaje de estado -->
        <div class="auth-message" id="auth-message">
            <span id="auth-message-text"></span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrarse</button>
        </div>

        <!-- Formulario Login -->
        <form class="auth-form visible" id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="login-email" class="form-input" placeholder="profe@escuela.edu.mx" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="auth-btn" id="login-btn">
                <span class="btn-text">Iniciar Sesión →</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Formulario Registro -->
        <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Nombre completo</label>
                <input type="text" id="reg-name" class="form-input" placeholder="Ej. Profa. Elena García" required oninput="generateNickname(this.value)">
            </div>
            <div class="form-group">
                <label class="form-label">Nickname para DidactIA</label>
                <input type="text" id="reg-nickname" class="form-input" placeholder="Se generará automáticamente" required>
                <span class="nickname-preview" id="nickname-preview">DidactIA te llamará así 👆</span>
            </div>
            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="reg-email" class="form-input" placeholder="profe@escuela.edu.mx" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="password-suggestion" onclick="useSuggestedPassword()" title="Clic para usar esta contraseña">
                    💡 Sugerida: <span id="suggested-password"></span>
                    <small style="color:var(--muted)">← Clic para usar</small>
                </div>
                <div class="password-wrapper" style="margin-top: 8px;">
                    <input type="password" id="reg-password" class="form-input" placeholder="O escribe la tuya (mín. 8 caracteres)" required minlength="8" autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-password')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="auth-btn" id="register-btn">
                <span class="btn-text">Crear mi cuenta →</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Al registrarte, aceptas usar esta herramienta con fines educativos 📚</p>
        </div>

    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword,
        onAuthStateChanged,
        updateProfile,
        setPersistence,
        browserSessionPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Redirigir si ya está logueado
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });

    // Generar partículas
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 3;
        p.style.cssText = `
            width: ${size}px; height: ${size}px;
            left: ${Math.random() * 100}%;
            animation-duration: ${Math.random() * 15 + 12}s;
            animation-delay: ${Math.random() * 10}s;
            background: ${Math.random() > 0.5 ? '#4F6EF7' : '#7C3AED'};
        `;
        particlesEl.appendChild(p);
    }

    // Generar contraseña sugerida
    function generatePassword() {
        const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
        return Array.from({length: 10}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }
    const suggestedPwd = generatePassword();
    document.getElementById('suggested-password').textContent = suggestedPwd;

    // Exponer funciones al window
    window.switchTab = (tab) => {
        document.getElementById('form-login').classList.toggle('visible', tab === 'login');
        document.getElementById('form-register').classList.toggle('visible', tab === 'register');
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        hideMessage();
    };

    window.togglePassword = (id) => {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    };

    window.useSuggestedPassword = () => {
        const pwd = document.getElementById('suggested-password').textContent;
        const input = document.getElementById('reg-password');
        input.value = pwd;
        input.type = 'text';
        showMessage('success', `✅ Contraseña "${pwd}" aplicada. ¡Guárdala en un lugar seguro!`);
    };

    window.generateNickname = (fullName) => {
        const parts = fullName.trim().split(' ');
        let nick = '';
        if (parts.length >= 2) {
            nick = parts[0] + ' ' + parts[1];
        } else {
            nick = parts[0] || '';
        }
        if (nick.toLowerCase().startsWith('profe') || nick.toLowerCase().startsWith('prof')) {
            nick = nick;
        }
        document.getElementById('reg-nickname').value = nick;
        const preview = document.getElementById('nickname-preview');
        if (nick.length > 2) {
            preview.textContent = `DidactIA te llamará "${nick}" 👆`;
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
    };

    function showMessage(type, text) {
        const el = document.getElementById('auth-message');
        const textEl = document.getElementById('auth-message-text');
        el.className = `auth-message ${type} visible`;
        textEl.textContent = text;
    }

    function hideMessage() {
        document.getElementById('auth-message').className = 'auth-message';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle('loading', loading);
        btn.disabled = loading;
    }

    window.handleLogin = async (e) => {
        e.preventDefault();
        hideMessage();
        setLoading('login-btn', true);
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        try {
            // Aplicar persistencia de sesión (se cierra al cerrar la pestaña)
            await setPersistence(auth, browserSessionPersistence);
            const userCred = await signInWithEmailAndPassword(auth, email, password);
            // No seteamos nada localmente aquí; dejaremos que index.html recupere el displayName real de la nube
            showMessage('success', '✅ ¡Bienvenido! Entrando a DidactIA...');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (err) {
            console.error(err);
            const msgs = {
                'auth/user-not-found': 'No existe una cuenta con ese correo.',
                'auth/wrong-password': 'Contraseña incorrecta. Inténtalo de nuevo.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/too-many-requests': 'Demasiados intentos. Espera un momento.',
                'auth/invalid-credential': 'Correo o contraseña incorrectos.'
            };
            showMessage('error', '⚠️ ' + (msgs[err.code] || 'Error al iniciar sesión. Detalle: ' + err.message));
            setLoading('login-btn', false);
        }
    };

    window.handleRegister = async (e) => {
        e.preventDefault();
        hideMessage();
        setLoading('register-btn', true);
        const name = document.getElementById('reg-name').value.trim();
        const nickname = document.getElementById('reg-nickname').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        try {
            // Aplicar persistencia de sesión tb al registrarse
            await setPersistence(auth, browserSessionPersistence);
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            
            // Guardamos el perfil en el sistema central de Firebase
            await updateProfile(userCred.user, {
                displayName: nickname
            });

            // Guardamos localmente para este navegador
            localStorage.setItem(`nick_${userCred.user.uid}`, nickname);
            localStorage.setItem(`name_${userCred.user.uid}`, name);
            
            showMessage('success', `🎉 ¡Bienvenido/a, ${nickname}! Cuenta creada. Entrando...`);
            setTimeout(() => window.location.href = 'index.html', 1500);
        } catch (err) {
            console.error(err);
            const msgs = {
                'auth/email-already-in-use': 'Ese correo ya tiene una cuenta.',
                'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/operation-not-allowed': 'El registro con correo/contraseña no está habilitado en la consola de Firebase.'
            };
            showMessage('error', '⚠️ ' + (msgs[err.code] || 'Error: ' + err.message));
            setLoading('register-btn', false);
        }
    };
</script>

</body>
</html>
